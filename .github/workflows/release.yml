name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - Cargo.toml
      - Cargo.lock
  workflow_dispatch:
    inputs:
      publish_crates:
        description: 'Publish to crates.io (set true to run the publish job)'
        required: true
        type: boolean
        default: false

      # Per-crate checkboxes (select/deselect)
      publish_atm_core:
        description: 'Publish crate: atm-core'
        required: false
        type: boolean
        default: true
      publish_atm_protocol:
        description: 'Publish crate: atm-protocol'
        required: false
        type: boolean
        default: true
      publish_atm_tmux:
        description: 'Publish crate: atm-tmux'
        required: false
        type: boolean
        default: true
      publish_atm_claude_adapter:
        description: 'Publish crate: atm-claude-adapter'
        required: false
        type: boolean
        default: true
      publish_atm_pi_adapter:
        description: 'Publish crate: atm-pi-adapter'
        required: false
        type: boolean
        default: true
      publish_atm_tui:
        description: 'Publish crate: atm-tui'
        required: false
        type: boolean
        default: true
      publish_atmd:
        description: 'Publish crate: atmd'
        required: false
        type: boolean
        default: true
      publish_atm:
        description: 'Publish crate: atm (root)'
        required: false
        type: boolean
        default: true

      include_deps:
        description: "(ignored) Include workspace dependencies — currently a no-op in this simple workflow"
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Verify packages without uploading (true/false). Default false.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine release version
        id: meta
        run: |-
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "atm") | .version')"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::Could not determine atm package version"
            exit 1
          fi

          tag="v$version"
          should_release=false

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "$tag" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo version $version ($tag)"
              exit 1
            fi
            should_release=true
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "$tag already exists; skipping release creation."
            else
              should_release=true
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "Version: $version"
          echo "Tag: $tag"
          echo "Should release: $should_release"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |-
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |-
          VERSION="${{ needs.prepare.outputs.version }}"
          DIRNAME="atm-$VERSION"
          mkdir "$DIRNAME"
          cp target/${{ matrix.target }}/release/atm "$DIRNAME/"
          cp target/${{ matrix.target }}/release/atmd "$DIRNAME/"
          cp crates/atm/scripts/atm-hook "$DIRNAME/"
          chmod +x "$DIRNAME"/*
          tar -czvf "atm-${{ matrix.target }}.tar.gz" "$DIRNAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atm-${{ matrix.target }}
          path: atm-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create version tag
        if: github.ref_type != 'tag'
        run: |-
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.tag }}" "$GITHUB_SHA"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/**/atm-*.tar.gz
            scripts/install.sh
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_crates == 'true'

    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate builds
        run: cargo build --release

      - name: Build publish list (bash, no python)
        id: plan
        run: |-
          set -euo pipefail
          EVENT_JSON="$GITHUB_EVENT_PATH"

          # Publish crates in dependency order so crates.io can resolve internal dependencies.
          ORIGINAL_ORDER=("atm-core" "atm-protocol" "atm-tmux" "atm-claude-adapter" "atm-pi-adapter" "atmd" "atm-tui" "atm")

          selected=()
          # Using jq (available on GitHub ubuntu runners) to read the dispatch inputs
          for box in publish_atm_core publish_atm_protocol publish_atm_tmux publish_atm_claude_adapter publish_atm_pi_adapter publish_atm_tui publish_atmd publish_atm; do
            val=$(jq -r --arg k "$box" '.inputs[$k] // "false"' "$EVENT_JSON" 2>/dev/null || echo "false")
            if [ "$(echo "$val" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
              case "$box" in
                publish_atm_core) selected+=("atm-core");;
                publish_atm_protocol) selected+=("atm-protocol");;
                publish_atm_tmux) selected+=("atm-tmux");;
                publish_atm_claude_adapter) selected+=("atm-claude-adapter");;
                publish_atm_pi_adapter) selected+=("atm-pi-adapter");;
                publish_atm_tui) selected+=("atm-tui");;
                publish_atmd) selected+=("atmd");;
                publish_atm) selected+=("atm");;
              esac
            fi
          done

          if [ "${#selected[@]}" -eq 0 ]; then
            echo "::error::No crates selected via checkboxes. Set at least one publish_* checkbox to true in the dispatch form."
            exit 1
          fi

          # Compose publish order by filtering ORIGINAL_ORDER
          publish_list=()
          for p in "${ORIGINAL_ORDER[@]}"; do
            for s in "${selected[@]}"; do
              if [ "$p" = "$s" ]; then
                publish_list+=("$p")
              fi
            done
          done

          # Export to GITHUB_OUTPUT
          # space-separated list is fine for the runner; we split it later
          echo "publish_names=${publish_list[*]}" >> "$GITHUB_OUTPUT"

          dry=$(jq -r '.inputs.dry_run // "false"' "$EVENT_JSON" 2>/dev/null || echo "false")
          if [ "$(echo "$dry" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show plan
        run: |-
          echo "Publish names: ${{ steps.plan.outputs.publish_names }}"
          echo "Dry run: ${{ steps.plan.outputs.dry_run }}"

      - name: Publish crates in order
        run: |-
          set -euo pipefail

          crate_version() {
            cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$1" '.packages[] | select(.name == $name) | .version'
          }

          crate_is_published() {
            local crate="$1"
            local version="$2"
            curl -fsSL \
              -H "User-Agent: agent-tmux-manager-release-workflow" \
              "https://crates.io/api/v1/crates/$crate" \
              | jq -e --arg version "$version" '.versions[] | select(.num == $version)' >/dev/null
          }

          wait_for_crate() {
            local crate="$1"
            local version="$2"
            for attempt in {1..30}; do
              if crate_is_published "$crate" "$version"; then
                echo "$crate $version is visible on crates.io"
                return 0
              fi
              echo "Waiting for $crate $version to appear in crates.io index (attempt $attempt/30)"
              sleep 10
            done
            echo "::error::$crate $version did not become visible on crates.io in time"
            return 1
          }

          read -r -a pkgs <<< "${{ steps.plan.outputs.publish_names }}"

          if [ "${{ steps.plan.outputs.dry_run }}" = "true" ]; then
            echo "VERIFY: cargo package --workspace"
            cargo package --workspace
            exit 0
          fi

          for p in "${pkgs[@]}"; do
            version="$(crate_version "$p")"
            if [ -z "$version" ] || [ "$version" = "null" ]; then
              echo "::error::Could not determine version for crate $p"
              exit 1
            fi

            if crate_is_published "$p" "$version"; then
              echo "$p $version is already published; skipping"
              continue
            fi

            echo "Publishing $p $version"
            cargo publish -p "$p" || { echo "::error::cargo publish failed for $p"; exit 1; }
            wait_for_crate "$p" "$version"
          done

      - name: Finished
        run: echo "All requested crates processed."
